name: Deploy & Run Daily Databricks Podcast

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: false
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      dry_run:
        description: "Dry run (skip GCS uploads)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      days_back:
        description: "Days to look back for news"
        required: false
        default: "1"

env:
  DATABRICKS_HOST: https://dbc-438ac3cd-0325.cloud.databricks.com
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  TARGET: ${{ github.event.inputs.target || 'prod' }}

jobs:
  deploy-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.236.0

      # ── Write ~/.databrickscfg directly to avoid setup-cli template issue ──
      - name: Configure Databricks CLI
        run: |
          printf '[DEFAULT]\nhost = %s\ntoken = %s\n' "$DATABRICKS_HOST" "$DATABRICKS_TOKEN" > ~/.databrickscfg

      # ── Verify auth before doing anything ─────────────────────────────────
      - name: Verify Databricks auth
        run: |
          databricks current-user me
          echo "Auth OK — connected to $DATABRICKS_HOST"

      # ── Deploy bundle, injecting all secrets as --var flags ────────────────
      # Secrets never touch disk — they go straight from GitHub Secrets
      # into Databricks as bundle variable values, then into notebook
      # base_parameters at job run time.
      - name: Deploy bundle to Databricks
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          AUDIO_BASE_URL: ${{ secrets.AUDIO_BASE_URL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          databricks bundle deploy --target $TARGET \
            --var "groq_api_key=${GROQ_API_KEY:-}" \
            --var "reddit_client_id=${REDDIT_CLIENT_ID:-}" \
            --var "reddit_client_secret=${REDDIT_CLIENT_SECRET:-}" \
            --var "youtube_api_key=${YOUTUBE_API_KEY:-}" \
            --var "gcp_service_account_json=${GCP_SERVICE_ACCOUNT_JSON:-}" \
            --var "gcs_bucket_name=${GCS_BUCKET_NAME:-}" \
            --var "audio_base_url=${AUDIO_BASE_URL:-}" \
            --var "claude_api_key=${CLAUDE_API_KEY:-}" \
            --var "google_api_key=${GOOGLE_API_KEY:-}"
          echo "Bundle deployed to target: $TARGET"

      # ── Trigger the Databricks job and wait for completion ─────────────────
      - name: Run podcast pipeline job
        run: |
          databricks bundle run daily_databricks_podcast \
            --target $TARGET \
            --params "days_back=${{ github.event.inputs.days_back || '1' }},max_stories=10"
        timeout-minutes: 60

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Daily Databricks Podcast — Pipeline Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | $TARGET |" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace | $DATABRICKS_HOST |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: deploy-and-run
    if: failure()
    steps:
      - name: Notify failure
        run: |
          echo "Podcast pipeline failed on target: ${{ github.event.inputs.target || 'prod' }}"
          echo "Workspace: $DATABRICKS_HOST"
