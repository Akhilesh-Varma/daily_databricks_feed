name: Daily Podcast Pipeline

on:
  # Run daily at 6 AM UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip uploads)"
        required: false
        default: "false"
        type: boolean
      days_back:
        description: "Days to look back for news"
        required: false
        default: "1"

env:
  PYTHON_VERSION: "3.10"
  DATA_PATH: "./data"

jobs:
  generate-podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache data directory
        uses: actions/cache@v4
        with:
          path: ./data
          key: podcast-data-${{ github.run_number }}
          restore-keys: |
            podcast-data-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install system dependencies (ffmpeg for pydub)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create data directory
        run: mkdir -p ./data

      - name: Step 1 - Bronze Ingestion
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DAYS_BACK: ${{ github.event.inputs.days_back || '1' }}
        run: |
          echo "=== Bronze Ingestion ==="
          cd notebooks
          python 01_bronze_ingestion.py || echo "Bronze ingestion completed with warnings"

      - name: Step 2 - Silver Transformation
        run: |
          echo "=== Silver Transformation ==="
          cd notebooks
          python 02_silver_transformation.py

      - name: Step 3 - Gold Aggregation
        run: |
          echo "=== Gold Aggregation ==="
          cd notebooks
          python 03_gold_aggregation.py

      - name: Step 4 - Script Generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          echo "=== Script Generation ==="
          cd notebooks
          python 04_script_generation.py

      - name: Step 5 - Audio Generation
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          USE_MOCK_TTS: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "=== Audio Generation ==="
          cd notebooks
          python 05_audio_generation.py

      - name: Step 6 - Publish Podcast
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          AUDIO_BASE_URL: ${{ secrets.AUDIO_BASE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "=== Publish Podcast ==="
          cd notebooks
          python 06_publish_podcast.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: podcast-output-${{ github.run_number }}
          path: |
            ./data/*.mp3
            ./data/*.xml
            ./data/*.json
          retention-days: 30

      - name: Summary
        run: |
          echo "## Podcast Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          if [ -f ./data/feed.xml ]; then
            echo "| Feed | Generated |" >> $GITHUB_STEP_SUMMARY
          fi
          if ls ./data/*.mp3 1> /dev/null 2>&1; then
            for f in ./data/*.mp3; do
              size=$(du -h "$f" | cut -f1)
              echo "| Audio | $size |" >> $GITHUB_STEP_SUMMARY
            done
          fi

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: generate-podcast
    if: failure()

    steps:
      - name: Notify failure
        run: |
          echo "Podcast generation failed. Check the logs for details."
          # Add notification logic here (Slack, email, etc.)
