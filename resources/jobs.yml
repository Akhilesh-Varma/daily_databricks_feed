# Workflow definition for Daily Databricks News Podcast
# Configured for Databricks Serverless Compute
#
# IMPORTANT: Serverless requires a paid Databricks workspace (not Community Edition)
# Supported on: AWS, Azure, GCP Databricks workspaces with serverless enabled

resources:
  jobs:
    daily_databricks_podcast:
      name: "Daily Databricks Podcast Generator"
      description: "Generates daily podcast from Databricks news sources using serverless compute"

      # Schedule - runs daily at 6 AM UTC
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"

      # Use serverless compute for all tasks
      # This eliminates cluster startup time and reduces costs
      parameters:
        - name: "days_back"
          default: "1"
        - name: "max_stories"
          default: "10"

      # Environment configuration for serverless
      environments:
        - environment_key: "default"
          spec:
            client: "1"
            dependencies:
              - requests>=2.31.0
              - praw>=7.7.0
              - feedparser>=6.0.0
              - pydub>=0.25.0
              - google-auth>=2.22.0
              - google-cloud-storage>=2.10.0
              - google-cloud-texttospeech>=2.14.0

      tasks:
        - task_key: bronze_ingestion
          description: "Fetch news from HN, Reddit, YouTube, RSS feeds"
          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingestion.py
            source: WORKSPACE
            base_parameters:
              DAYS_BACK: "{{job.parameters.days_back}}"
          # Serverless compute - no cluster specification needed
          environment_key: "default"

        - task_key: silver_transformation
          description: "Clean, deduplicate, and extract keywords"
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../notebooks/02_silver_transformation.py
            source: WORKSPACE
          environment_key: "default"

        - task_key: gold_aggregation
          description: "Select top 10 stories for the day"
          depends_on:
            - task_key: silver_transformation
          notebook_task:
            notebook_path: ../notebooks/03_gold_aggregation.py
            source: WORKSPACE
            base_parameters:
              MAX_STORIES: "{{job.parameters.max_stories}}"
          environment_key: "default"

        - task_key: script_generation
          description: "Generate podcast script using LLM"
          depends_on:
            - task_key: gold_aggregation
          notebook_task:
            notebook_path: ../notebooks/04_script_generation.py
            source: WORKSPACE
          environment_key: "default"

        - task_key: audio_generation
          description: "Convert script to audio using TTS"
          depends_on:
            - task_key: script_generation
          notebook_task:
            notebook_path: ../notebooks/05_audio_generation.py
            source: WORKSPACE
          environment_key: "default"

        - task_key: publish_podcast
          description: "Upload audio and update RSS feed"
          depends_on:
            - task_key: audio_generation
          notebook_task:
            notebook_path: ../notebooks/06_publish_podcast.py
            source: WORKSPACE
          environment_key: "default"

      # Job-level settings
      max_concurrent_runs: 1

      # Email notifications
      email_notifications:
        on_failure:
          - ${NOTIFICATION_EMAIL}
        on_success:
          - ${NOTIFICATION_EMAIL}

      # Webhook notifications (optional)
      # webhook_notifications:
      #   on_failure:
      #     - id: "webhook_id"

      # Tags for organization
      tags:
        project: "daily-databricks-podcast"
        environment: "${bundle.target}"
        compute: "serverless"

    # Alternative: Job with Python tasks (for non-notebook workflows)
    daily_databricks_podcast_python:
      name: "Daily Databricks Podcast Generator (Python Tasks)"
      description: "Alternative job using Python script tasks with serverless"

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: "PAUSED"  # Disabled by default, enable if preferred

      tasks:
        - task_key: run_pipeline
          description: "Run full podcast pipeline"
          python_wheel_task:
            package_name: "daily_databricks_feed"
            entry_point: "run_pipeline"
            parameters:
              - "--days-back"
              - "1"
              - "--max-stories"
              - "10"
          environment_key: "default"
          libraries:
            - whl: ../dist/daily_databricks_feed-*.whl

      environments:
        - environment_key: "default"
          spec:
            client: "1"

      max_concurrent_runs: 1
      tags:
        project: "daily-databricks-podcast"
        compute: "serverless"
