# Workflow definition for Daily Databricks News Podcast
#
# Two parallel branches run after bronze_ingestion:
#
#   ANALYTICS BRANCH  — dlt_refresh
#     Reads bronze_raw_landing via Structured Streaming and produces versioned
#     Unity Catalog tables (bronze_news, silver_news, gold_top_stories,
#     gold_daily_summary) for observability, dashboards, and historical queries.
#
#   PRODUCTION BRANCH — silver_transformation → gold_aggregation → … → publish_podcast
#     Reads from JSON files written by the ingestion notebook and drives the
#     actual podcast episode. Delta tables are written with an _nb suffix.
#
# Both branches depend on bronze_ingestion completing first and run in parallel
# because they are independent — the analytics DLT tables are NOT consumed by
# the podcast production chain.
#
# Secrets are injected via bundle variables (set by --var flags in deploy.yml)
# and read by notebooks through SecretsManager (widget args → os.environ).
# For enhanced security, store secrets in a Databricks Secret Scope named
# "daily-podcast" — SecretsManager will automatically fall back to it.

resources:
  jobs:
    daily_databricks_podcast:
      name: "Daily Databricks Podcast Generator"
      description: "Generates daily podcast from Databricks news sources using serverless compute"

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"

      parameters:
        - name: "days_back"
          default: "1"
        - name: "max_stories"
          default: "10"

      # Serverless environment — all secrets injected here as env vars
      environments:
        - environment_key: "default"
          spec:
            dependencies:
              - ${workspace.root_path}/artifacts/.internal/daily_databricks_feed-0.1.0-py3-none-any.whl
              - requests>=2.31.0
              - praw>=7.7.0
              - feedparser>=6.0.0
              - google-auth>=2.22.0
              - google-cloud-storage>=2.10.0
              - google-cloud-texttospeech>=2.14.0

      tasks:
        - task_key: bronze_ingestion
          description: "Fetch news from HN, Reddit, YouTube, RSS feeds"
          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingestion.py
            source: WORKSPACE
            base_parameters:
              DAYS_BACK: "{{job.parameters.days_back}}"
              REDDIT_CLIENT_ID: "${var.reddit_client_id}"
              REDDIT_CLIENT_SECRET: "${var.reddit_client_secret}"
              YOUTUBE_API_KEY: "${var.youtube_api_key}"
          environment_key: "default"

        - task_key: dlt_refresh
          description: "Refresh DLT pipeline (Bronze→Silver→Gold in Unity Catalog)"
          depends_on:
            - task_key: bronze_ingestion
          pipeline_task:
            pipeline_id: ${resources.pipelines.databricks_news_dlt.id}
            full_refresh: false

        - task_key: silver_transformation
          description: "Clean, deduplicate, and extract keywords"
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../notebooks/02_silver_transformation.py
            source: WORKSPACE
          environment_key: "default"

        - task_key: gold_aggregation
          description: "Select top stories for the day"
          depends_on:
            - task_key: silver_transformation
          notebook_task:
            notebook_path: ../notebooks/03_gold_aggregation.py
            source: WORKSPACE
            base_parameters:
              MAX_STORIES: "{{job.parameters.max_stories}}"
          environment_key: "default"

        - task_key: script_generation
          description: "Generate podcast script using Groq (primary) / Claude / Gemini"
          depends_on:
            - task_key: gold_aggregation
          notebook_task:
            notebook_path: ../notebooks/04_script_generation.py
            source: WORKSPACE
            base_parameters:
              GROQ_API_KEY: "${var.groq_api_key}"
              CLAUDE_API_KEY: "${var.claude_api_key}"
              GOOGLE_API_KEY: "${var.google_api_key}"
          environment_key: "default"
          timeout_seconds: 600
          max_retries: 1
          min_retry_interval_millis: 30000

        - task_key: audio_generation
          description: "Convert script to MP3 using Google Cloud TTS"
          depends_on:
            - task_key: script_generation
          notebook_task:
            notebook_path: ../notebooks/05_audio_generation.py
            source: WORKSPACE
            base_parameters:
              GCP_SERVICE_ACCOUNT_JSON: "${var.gcp_service_account_json}"
          environment_key: "default"
          timeout_seconds: 1800
          max_retries: 1
          min_retry_interval_millis: 60000

        - task_key: publish_podcast
          description: "Upload audio to GCS and update RSS feed"
          depends_on:
            - task_key: audio_generation
          notebook_task:
            notebook_path: ../notebooks/06_publish_podcast.py
            source: WORKSPACE
            base_parameters:
              GCP_SERVICE_ACCOUNT_JSON: "${var.gcp_service_account_json}"
              GCS_BUCKET_NAME: "${var.gcs_bucket_name}"
              AUDIO_BASE_URL: "${var.audio_base_url}"
          environment_key: "default"
          timeout_seconds: 600
          max_retries: 2
          min_retry_interval_millis: 30000

      max_concurrent_runs: 1

      email_notifications:
        on_failure:
          - ${SERVICE_PRINCIPAL_NAME}

      tags:
        project: "daily-databricks-podcast"
        environment: "${bundle.target}"
        compute: "serverless"
