# Workflow definition for Daily Databricks News Podcast
# Secrets are injected from Databricks Secret Scope "daily-podcast"
# (populated by GitHub Actions deploy.yml before bundle deploy)

resources:
  jobs:
    daily_databricks_podcast:
      name: "Daily Databricks Podcast Generator"
      description: "Generates daily podcast from Databricks news sources using serverless compute"

      # Schedule - runs daily at 6 AM UTC
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"

      # Job-level parameters
      parameters:
        - name: "days_back"
          default: "1"
        - name: "max_stories"
          default: "10"

      # Serverless environment — dependencies installed at runtime
      environments:
        - environment_key: "default"
          spec:
            client: "1"
            dependencies:
              - requests>=2.31.0
              - praw>=7.7.0
              - feedparser>=6.0.0
              - pydub>=0.25.0
              - google-auth>=2.22.0
              - google-cloud-storage>=2.10.0
              - google-cloud-texttospeech>=2.14.0

      tasks:
        # ── Task 1: Fetch news from all sources ────────────────────────────
        - task_key: bronze_ingestion
          description: "Fetch news from HN, Reddit, YouTube, RSS feeds"
          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingestion.py
            source: WORKSPACE
            base_parameters:
              DAYS_BACK: "{{job.parameters.days_back}}"
          environment_key: "default"

        # ── Task 2: Clean and deduplicate ─────────────────────────────────
        - task_key: silver_transformation
          description: "Clean, deduplicate, and extract keywords"
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../notebooks/02_silver_transformation.py
            source: WORKSPACE
          environment_key: "default"

        # ── Task 3: Select top stories ────────────────────────────────────
        - task_key: gold_aggregation
          description: "Select top stories for the day"
          depends_on:
            - task_key: silver_transformation
          notebook_task:
            notebook_path: ../notebooks/03_gold_aggregation.py
            source: WORKSPACE
            base_parameters:
              MAX_STORIES: "{{job.parameters.max_stories}}"
          environment_key: "default"

        # ── Task 4: Generate podcast script with LLM ──────────────────────
        - task_key: script_generation
          description: "Generate podcast script using Groq / Anthropic / Gemini"
          depends_on:
            - task_key: gold_aggregation
          notebook_task:
            notebook_path: ../notebooks/04_script_generation.py
            source: WORKSPACE
          environment_key: "default"

        # ── Task 5: Convert script to audio via GCP TTS ───────────────────
        - task_key: audio_generation
          description: "Convert script to MP3 using Google Cloud TTS"
          depends_on:
            - task_key: script_generation
          notebook_task:
            notebook_path: ../notebooks/05_audio_generation.py
            source: WORKSPACE
          environment_key: "default"

        # ── Task 6: Upload audio + publish RSS feed ────────────────────────
        - task_key: publish_podcast
          description: "Upload audio to GCS and update RSS feed"
          depends_on:
            - task_key: audio_generation
          notebook_task:
            notebook_path: ../notebooks/06_publish_podcast.py
            source: WORKSPACE
          environment_key: "default"

      max_concurrent_runs: 1

      # Email notifications (set NOTIFICATION_EMAIL GitHub secret to enable)
      email_notifications:
        on_failure:
          - ${var.notification_email}
        on_success:
          - ${var.notification_email}

      tags:
        project: "daily-databricks-podcast"
        environment: "${bundle.target}"
        compute: "serverless"
