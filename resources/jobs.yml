# Workflow definition for Daily Databricks News Podcast
# Note: This is for reference when using Databricks Pro/Enterprise
# For Community Edition, use GitHub Actions workflow instead

resources:
  jobs:
    daily_databricks_podcast:
      name: "Daily Databricks Podcast Generator"
      description: "Generates daily podcast from Databricks news sources"

      # Schedule (not available in Community Edition - use GitHub Actions)
      # schedule:
      #   quartz_cron_expression: "0 0 6 * * ?"
      #   timezone_id: "UTC"

      tasks:
        - task_key: bronze_ingestion
          description: "Fetch news from HN, Reddit, YouTube, RSS feeds"
          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingestion.py
            source: WORKSPACE
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

        - task_key: silver_transformation
          description: "Clean, deduplicate, and extract keywords"
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../notebooks/02_silver_transformation.py
            source: WORKSPACE
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

        - task_key: gold_aggregation
          description: "Select top 10 stories for the day"
          depends_on:
            - task_key: silver_transformation
          notebook_task:
            notebook_path: ../notebooks/03_gold_aggregation.py
            source: WORKSPACE
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

        - task_key: script_generation
          description: "Generate podcast script using LLM"
          depends_on:
            - task_key: gold_aggregation
          notebook_task:
            notebook_path: ../notebooks/04_script_generation.py
            source: WORKSPACE
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

        - task_key: audio_generation
          description: "Convert script to audio using TTS"
          depends_on:
            - task_key: script_generation
          notebook_task:
            notebook_path: ../notebooks/05_audio_generation.py
            source: WORKSPACE
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

        - task_key: publish_podcast
          description: "Upload audio and update RSS feed"
          depends_on:
            - task_key: audio_generation
          notebook_task:
            notebook_path: ../notebooks/06_publish_podcast.py
            source: WORKSPACE
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

      email_notifications:
        on_failure:
          - ${NOTIFICATION_EMAIL}

      max_concurrent_runs: 1
