# Databricks Asset Bundle configuration for Daily Databricks News Podcast
# Configured for Serverless Compute
#
# IMPORTANT: Serverless requires a paid Databricks workspace
# - AWS: Premium or Enterprise tier
# - Azure: Premium tier
# - GCP: Premium tier
#
# For Community Edition (free), use the GitHub Actions workflow instead

bundle:
  name: daily_databricks_feed

variables:
  # Data storage paths
  data_path:
    description: "Base path for data storage"
    default: "/Workspace/${workspace.current_user.userName}/daily_databricks_feed/data"

  # Volume path for Unity Catalog (if available)
  volume_path:
    description: "Unity Catalog volume path for artifacts"
    default: "/Volumes/main/default/podcast_data"

  # Podcast configuration
  podcast_title:
    description: "Name of the podcast"
    default: "Daily Databricks Digest"

  podcast_description:
    description: "Podcast description"
    default: "Your daily 5-minute update on Databricks, data engineering, and lakehouse news"

  # Notification email (set NOTIFICATION_EMAIL in GitHub secrets to enable)
  notification_email:
    description: "Email for job notifications"
    default: "noreply@example.com"

  # Databricks Secret Scope name (populated by GitHub Actions deploy workflow)
  secret_scope:
    description: "Databricks secret scope holding all API keys"
    default: "daily-podcast"

include:
  - resources/*.yml

# Artifact configuration for wheel distribution
artifacts:
  default:
    type: whl
    path: .
    build: python setup.py bdist_wheel

# Sync configuration
sync:
  include:
    - "notebooks/**"
    - "src/**"
  exclude:
    - "**/__pycache__"
    - "**/.pytest_cache"
    - "**/data"
    - "**/*.pyc"

targets:
  # Development target with serverless
  dev:
    mode: development
    default: true
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      data_path: "/Workspace/${workspace.current_user.userName}/daily_databricks_feed/dev/data"
      notification_email: ""
    run_as:
      # Uses current user's identity
      user_name: ${workspace.current_user.userName}

  # Staging target
  staging:
    mode: development
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      data_path: "/Workspace/Shared/daily_databricks_feed/staging/data"
    run_as:
      user_name: ${workspace.current_user.userName}

  # Production target with serverless
  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}
      root_path: /Workspace/Shared/daily_databricks_feed/prod
    variables:
      data_path: "/Volumes/main/default/podcast_data"
      notification_email: ${NOTIFICATION_EMAIL}
    run_as:
      # Use service principal in production
      service_principal_name: ${SERVICE_PRINCIPAL_NAME}
    permissions:
      - level: CAN_VIEW
        group_name: users
      - level: CAN_MANAGE
        group_name: admins

  # Local development (for testing without Databricks)
  local:
    mode: development
    variables:
      data_path: "./data"
