# Databricks Asset Bundle configuration for Daily Databricks News Podcast
# Secrets are passed as bundle variables via --var flags in deploy.yml
# and injected into the serverless environment spec.

bundle:
  name: daily_databricks_feed

variables:
  # ── Data paths ──────────────────────────────────────────────────────────────
  data_path:
    description: "Base path for data storage"
    default: "/Workspace/${workspace.current_user.userName}/daily_databricks_feed/data"

  volume_path:
    description: "Unity Catalog volume path for artifacts"
    default: "/Volumes/main/default/podcast_data"

  # ── Podcast metadata ─────────────────────────────────────────────────────────
  podcast_title:
    description: "Name of the podcast"
    default: "Daily Databricks Digest"

  notification_email:
    description: "Email for job notifications"
    default: "noreply@example.com"

  # ── API secrets (passed via --var in deploy.yml) ─────────────────────────────
  reddit_client_id:
    description: "Reddit OAuth client ID"
    default: ""

  reddit_client_secret:
    description: "Reddit OAuth client secret"
    default: ""

  youtube_api_key:
    description: "YouTube Data API key"
    default: ""

  gcp_service_account_json:
    description: "GCP service account JSON (single line)"
    default: ""

  gcs_bucket_name:
    description: "GCS bucket for audio and RSS feed"
    default: ""

  audio_base_url:
    description: "Public base URL for audio files"
    default: ""

  claude_api_key:
    description: "Anthropic Claude API key"
    default: ""

  google_api_key:
    description: "Google Gemini API key (optional fallback)"
    default: ""

include:
  - resources/*.yml

artifacts:
  default:
    type: whl
    path: .
    build: python setup.py bdist_wheel

sync:
  include:
    - "notebooks/**"
    - "src/**"
  exclude:
    - "**/__pycache__"
    - "**/.pytest_cache"
    - "**/data"
    - "**/*.pyc"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      data_path: "/Workspace/${workspace.current_user.userName}/daily_databricks_feed/dev/data"
      notification_email: ""
    run_as:
      user_name: ${workspace.current_user.userName}

  staging:
    mode: development
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      data_path: "/Workspace/Shared/daily_databricks_feed/staging/data"
    run_as:
      user_name: ${workspace.current_user.userName}

  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}
      root_path: /Workspace/Shared/daily_databricks_feed/prod
    variables:
      data_path: "/Volumes/main/default/podcast_data"
      notification_email: ${NOTIFICATION_EMAIL}
    run_as:
      service_principal_name: ${SERVICE_PRINCIPAL_NAME}
    permissions:
      - level: CAN_VIEW
        group_name: users
      - level: CAN_MANAGE
        group_name: admins

  local:
    mode: development
    variables:
      data_path: "./data"
